<!doctype html>
<html lang="en" dir="ltr">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Login page for the static SwiftShip customer and admin courier dashboards.">
  <meta name="robots" content="noindex,nofollow">
  <title>Login | SwiftShip Dashboard Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Playfair+Display:wght@700;800;900&amp;display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <link href="../assets/css/dark-mode.css" rel="stylesheet">
  <link href="../assets/css/rtl.css" rel="stylesheet">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128230;</text></svg>">
</head>
<body class="auth-page login-page">

  <a class="skip-link" href="#main">Skip to content</a>
<main id="main">

<section class="login-screen d-flex align-items-center justify-content-center" style="min-height: 100vh;">
  <div class="container d-flex justify-content-center">
    <div class="login-form-area w-100" style="max-width: 450px;">
      <form class="auth-card login-card needs-validation" data-auth-form="login" data-static-form data-redirect="dashboard-home.html" data-success-message="Login successful. Loading your dashboard..." novalidate>
        <div class="login-card-header text-center mb-4">
          <h2>Login</h2>
          <p class="lead-muted">Use a customer account or admin operator credentials.</p>
        </div>
        <div class="form-floating mb-3">
          <input class="form-control" id="loginEmail" type="email" placeholder="name@example.com" autocomplete="email" required>
          <label for="loginEmail">Email address</label>
          <div class="invalid-feedback">Enter your email.</div>
        </div>
        <div class="form-floating mb-3">
          <input class="form-control" id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" minlength="6" required>
          <label for="loginPassword">Password</label>
          <div class="invalid-feedback">Enter at least six characters.</div>
        </div>
        <div class="login-help-row mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberLogin">
            <label class="form-check-label" for="rememberLogin">Remember me</label>
          </div>
          <button class="link-button" type="button" data-password-reset>Forgot Password?</button>
        </div>
        <button class="btn btn-primary w-100 mb-4" type="submit">Login</button>
        
        <div class="position-relative text-center mb-4">
            <hr class="text-muted">
            <span class="position-absolute top-50 start-50 translate-middle px-2 bg-white text-muted small" style="background: var(--color-card) !important;">Or continue with</span>
        </div>
        
        <div class="d-flex gap-3">
            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" type="button">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" type="button">
                <i class="fa-brands fa-apple"></i> Apple
            </button>
        </div>
        <p class="form-message mt-3" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
